<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Paint Generator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: #aaa;
    }

    input[type="range"] {
      width: 120px;
      accent-color: #888;
      cursor: pointer;
    }

    select {
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    button {
      background: #fff;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover { background: #ddd; }
    button:active { transform: scale(0.97); }

    #canvas-wrap {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      max-width: 100%;
    }

    canvas {
      display: block;
      max-width: 100%;
    }

    .hex-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 700px;
    }

    .hex-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1e1e1e;
      border-radius: 6px;
      padding: 4px 10px 4px 6px;
      font-size: 0.72rem;
      font-family: monospace;
      color: #ccc;
      cursor: pointer;
      border: 1px solid #333;
      transition: border-color 0.15s;
    }

    .hex-chip:hover { border-color: #666; }

    .hex-chip .swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .copied-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #111;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .copied-toast.show { opacity: 1; }

    .info {
      font-size: 0.72rem;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>Random Paint Generator</h1>

  <div class="controls">
    <div class="control-group">
      <label for="grid-size">Grid size: <span id="grid-label">20</span></label>
      <input type="range" id="grid-size" min="4" max="80" value="20" />
    </div>

    <div class="control-group">
      <label for="palette-mode">Color palette</label>
      <select id="palette-mode">
        <option value="full">Full spectrum</option>
        <option value="pastel">Pastel</option>
        <option value="dark">Dark tones</option>
        <option value="warm">Warm (reds/oranges)</option>
        <option value="cool">Cool (blues/greens)</option>
        <option value="mono">Monochrome</option>
      </select>
    </div>

    <button id="generate-btn">Generate</button>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas" width="660" height="660"></canvas>
  </div>

  <p class="info">Click any hex chip below to copy it to clipboard</p>

  <div class="hex-palette" id="hex-palette"></div>
  <div class="copied-toast" id="toast">Copied!</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const gridInput = document.getElementById('grid-size');
    const gridLabel = document.getElementById('grid-label');
    const paletteMode = document.getElementById('palette-mode');
    const hexPaletteEl = document.getElementById('hex-palette');
    const toast = document.getElementById('toast');

    gridInput.addEventListener('input', () => {
      gridLabel.textContent = gridInput.value;
    });

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function toHex(n) {
      return n.toString(16).padStart(2, '0');
    }

    function randomColor(mode) {
      let r, g, b;
      switch (mode) {
        case 'pastel':
          r = randomInt(160, 255); g = randomInt(160, 255); b = randomInt(160, 255); break;
        case 'dark':
          r = randomInt(0, 100); g = randomInt(0, 100); b = randomInt(0, 100); break;
        case 'warm':
          r = randomInt(180, 255); g = randomInt(60, 160); b = randomInt(0, 80); break;
        case 'cool':
          r = randomInt(0, 80); g = randomInt(100, 200); b = randomInt(160, 255); break;
        case 'mono': {
          const v = randomInt(0, 255); r = g = b = v; break;
        }
        default:
          r = randomInt(0, 255); g = randomInt(0, 255); b = randomInt(0, 255);
      }
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function generate() {
      const gridSize = parseInt(gridInput.value, 10);
      const mode = paletteMode.value;
      const cellSize = canvas.width / gridSize;
      const usedColors = new Set();

      for (let row = 0; row < gridSize; row++) {
        for (let col = 0; col < gridSize; col++) {
          const hex = randomColor(mode);
          usedColors.add(hex);
          ctx.fillStyle = hex;
          ctx.fillRect(
            Math.round(col * cellSize), Math.round(row * cellSize),
            Math.ceil(cellSize), Math.ceil(cellSize)
          );
        }
      }

      renderPalette([...usedColors]);
    }

    function renderPalette(colors) {
      hexPaletteEl.innerHTML = '';
      colors.slice(0, 30).forEach(hex => {
        const chip = document.createElement('div');
        chip.className = 'hex-chip';
        chip.title = 'Click to copy';

        const swatch = document.createElement('div');
        swatch.className = 'swatch';
        swatch.style.background = hex;

        const label = document.createElement('span');
        label.textContent = hex.toUpperCase();

        chip.appendChild(swatch);
        chip.appendChild(label);
        chip.addEventListener('click', () => copyHex(hex));
        hexPaletteEl.appendChild(chip);
      });
    }

    let toastTimer;
    function copyHex(hex) {
      navigator.clipboard.writeText(hex.toUpperCase()).then(() => {
        toast.textContent = `Copied ${hex.toUpperCase()}`;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
      });
    }

    document.getElementById('generate-btn').addEventListener('click', generate);
    generate();
  </script>
</body>
</html>
