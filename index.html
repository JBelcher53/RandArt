<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seeded Gradient Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: #aaa;
    }

    input[type="range"] {
      width: 120px;
      accent-color: #888;
      cursor: pointer;
    }

    input[type="number"] {
      width: 110px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 6px 0 0 6px;
      padding: 4px 8px;
      font-size: 0.8rem;
      font-family: monospace;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .shuffle-btn {
      background: #333;
      color: #ccc;
      border: 1px solid #444;
      border-left: none;
      border-radius: 0 6px 6px 0;
      padding: 4px 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
      line-height: 1;
    }
    .shuffle-btn:hover { background: #444; color: #fff; }

    .seed-row {
      display: flex;
      align-items: center;
    }

    select {
      background: #222;
      color: #eee;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    button#generate-btn {
      background: #fff;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, transform 0.1s;
    }
    button#generate-btn:hover { background: #ddd; }
    button#generate-btn:active { transform: scale(0.97); }

    #canvas-wrap {
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      max-width: 100%;
    }

    canvas {
      display: block;
      max-width: 100%;
    }

    .hex-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 720px;
    }

    .grad-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #1e1e1e;
      border-radius: 6px;
      padding: 4px 10px 4px 6px;
      font-size: 0.68rem;
      font-family: monospace;
      color: #bbb;
      cursor: pointer;
      border: 1px solid #333;
      transition: border-color 0.15s;
    }
    .grad-chip:hover { border-color: #666; }

    .grad-chip .swatch {
      width: 40px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .copied-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #111;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .copied-toast.show { opacity: 1; }

    .info { font-size: 0.72rem; color: #555; }
  </style>
</head>
<body>

  <h1>Seeded Gradient Generator</h1>

  <div class="controls">
    <div class="control-group">
      <label for="grid-size">Grid size: <span id="grid-label">20</span></label>
      <input type="range" id="grid-size" min="4" max="80" value="20" />
    </div>

    <div class="control-group">
      <label for="palette-mode">Color palette</label>
      <select id="palette-mode">
        <option value="full">Full spectrum</option>
        <option value="pastel">Pastel</option>
        <option value="dark">Dark tones</option>
        <option value="warm">Warm (reds/oranges)</option>
        <option value="cool">Cool (blues/greens)</option>
        <option value="mono">Monochrome</option>
      </select>
    </div>

    <div class="control-group">
      <label for="seed-input">Seed</label>
      <div class="seed-row">
        <input type="number" id="seed-input" min="0" max="9999999999" />
        <button class="shuffle-btn" id="shuffle-btn" title="Random seed">&#x21BA;</button>
      </div>
    </div>

    <button id="generate-btn">Generate</button>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas" width="660" height="660"></canvas>
  </div>

  <p class="info">Click a chip to copy its CSS gradient</p>

  <div class="hex-palette" id="hex-palette"></div>
  <div class="copied-toast" id="toast">Copied!</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const gridInput = document.getElementById('grid-size');
    const gridLabel = document.getElementById('grid-label');
    const paletteMode = document.getElementById('palette-mode');
    const seedInput = document.getElementById('seed-input');
    const hexPaletteEl = document.getElementById('hex-palette');
    const toast = document.getElementById('toast');

    function mulberry32(seed) {
      return function () {
        seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
        let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    let rng = Math.random;

    function ri(min, max) { return Math.floor(rng() * (max - min + 1)) + min; }
    function toHex(n) { return n.toString(16).padStart(2, '0'); }
    function randomSeed() { return Math.floor(Math.random() * 1_000_000_000); }

    seedInput.value = randomSeed();

    function randomColor(mode) {
      let r, g, b;
      switch (mode) {
        case 'pastel': r = ri(160,255); g = ri(160,255); b = ri(160,255); break;
        case 'dark':   r = ri(0,100);   g = ri(0,100);   b = ri(0,100);   break;
        case 'warm':   r = ri(180,255); g = ri(60,160);  b = ri(0,80);    break;
        case 'cool':   r = ri(0,80);    g = ri(100,200); b = ri(160,255); break;
        case 'mono': { const v = ri(0,255); r = g = b = v; break; }
        default:       r = ri(0,255);   g = ri(0,255);   b = ri(0,255);
      }
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    const ANGLES = [0, 45, 90, 135, 180, 225, 270, 315];

    function cellGradientPoints(angle, x, y, size) {
      const rad = (angle * Math.PI) / 180;
      const cx = x + size / 2, cy = y + size / 2;
      const dx = Math.cos(rad) * size / 2;
      const dy = Math.sin(rad) * size / 2;
      return [cx - dx, cy - dy, cx + dx, cy + dy];
    }

    function generate() {
      const seed = parseInt(seedInput.value, 10);
      rng = mulberry32(isNaN(seed) ? 0 : seed);

      const gridSize = parseInt(gridInput.value, 10);
      const mode = paletteMode.value;
      const cellSize = canvas.width / gridSize;
      const pairs = [];

      for (let row = 0; row < gridSize; row++) {
        for (let col = 0; col < gridSize; col++) {
          const c1 = randomColor(mode);
          const c2 = randomColor(mode);
          const angle = ANGLES[ri(0, ANGLES.length - 1)];

          const x = Math.round(col * cellSize);
          const y = Math.round(row * cellSize);
          const w = Math.ceil(cellSize);
          const h = Math.ceil(cellSize);

          const [x0, y0, x1, y1] = cellGradientPoints(angle, x, y, cellSize);
          const grad = ctx.createLinearGradient(x0, y0, x1, y1);
          grad.addColorStop(0, c1);
          grad.addColorStop(1, c2);
          ctx.fillStyle = grad;
          ctx.fillRect(x, y, w, h);

          pairs.push({ c1, c2, angle });
        }
      }

      renderPalette(pairs.slice(0, 24));
    }

    function renderPalette(pairs) {
      hexPaletteEl.innerHTML = '';
      pairs.forEach(({ c1, c2, angle }) => {
        const cssGrad = `linear-gradient(${angle}deg, ${c1}, ${c2})`;

        const chip = document.createElement('div');
        chip.className = 'grad-chip';
        chip.title = 'Click to copy CSS gradient';

        const swatch = document.createElement('div');
        swatch.className = 'swatch';
        swatch.style.background = cssGrad;

        const label = document.createElement('span');
        label.textContent = `${c1.toUpperCase()} → ${c2.toUpperCase()}`;

        chip.appendChild(swatch);
        chip.appendChild(label);
        chip.addEventListener('click', () => copyText(cssGrad));
        hexPaletteEl.appendChild(chip);
      });
    }

    let toastTimer;
    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        toast.textContent = 'Copied!';
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
      });
    }

    gridInput.addEventListener('input', () => { gridLabel.textContent = gridInput.value; });

    document.getElementById('shuffle-btn').addEventListener('click', () => {
      seedInput.value = randomSeed();
      generate();
    });

    document.getElementById('generate-btn').addEventListener('click', generate);

    generate();
  </script>
</body>
</html>
